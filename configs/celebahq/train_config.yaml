# Training hyperparameters for the CelebA-HQ experiment.
#
# Loaded by train_lsd.py via `--train_config`. Values here act as argparse
# defaults; any flag passed on the `accelerate launch` command line overrides
# them. Run/machine-specific paths (output_dir, dataset_root, dataset_glob and
# the model component config paths) are intentionally NOT here -- pass those
# on the command line (see train.sh).

# --- optimization ---
learning_rate: 2.0e-5            # base LR; encoder LR = learning_rate * encoder_lr_scale
encoder_lr_scale: 1.0
gradient_accumulation_steps: 1
max_train_steps: 500000
seed: 42

# --- data loading ---
resolution: 128
train_batch_size: 32
train_split_portion: 0.9
dataloader_num_workers: 4

# --- validation ---
val_batch_size: 32
num_validation_images: 32
validation_steps: 5000

# --- checkpointing ---
checkpointing_steps: 25000
checkpoints_total_limit: 2

# --- runtime ---
mixed_precision: bf16
allow_tf32: true
enable_xformers_memory_efficient_attention: true

# --- logging ---
tracker_project_name: latent_decomposed_diffusion
